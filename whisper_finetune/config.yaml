# ── Paths ──────────────────────────────────────────────────────
paths:
  manifest: "./normal2whisper_work/manifest.csv"

models:
  - id: "openai/whisper-small.en"
    output_dir: "./whisper-small-finetuned_v4"
  - id: "distil-whisper/distil-small.en"
    output_dir: "./distil-whisper-finetuned_v4"

# ── Data ───────────────────────────────────────────────────────
data:
  sample_rate: 16000
  val_size: 0.15
  test_size: 0.15
  seed: 42

# ── Model ──────────────────────────────────────────────────────
model:
  freeze_layers: 4          # freeze encoder layers 0..(N-1)

# ── Training hyperparameters ───────────────────────────────────
training:
  max_steps: 2000
  learning_rate: 1.0e-5
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  train_batch_size: 4
  eval_batch_size: 4
  gradient_accumulation_steps: 4
  eval_steps: 200
  save_steps: 200
  logging_steps: 50
  dataloader_num_workers: 2
  early_stopping_patience: 3
