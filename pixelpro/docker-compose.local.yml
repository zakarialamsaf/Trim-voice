version: "3.9"

# Self-contained local dev stack
# Usage: docker compose -f docker-compose.local.yml up --build
#
# Services:
#   http://localhost:8000       FastAPI  (+ /docs for Swagger)
#   http://localhost:3000       Next.js frontend
#   http://localhost:9001       MinIO console (user: minioadmin / minioadmin)
#   http://localhost:5555       Flower (Celery monitor)
#   http://localhost:5432       PostgreSQL
#   http://localhost:6379       Redis

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pixelpro
      POSTGRES_PASSWORD: pixelpro_secret
      POSTGRES_DB: pixelpro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/pixelpro-inputs;
        mc mb --ignore-existing local/pixelpro-outputs;
        mc anonymous set download local/pixelpro-outputs;
        echo 'MinIO buckets ready.';
      "

  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env
    environment:
      - AWS_ENDPOINT_URL=http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./backend/app:/app/app   # hot reload
    restart: unless-stopped

  # ── Celery Worker (CPU fallback — AI models use OpenCV only) ─────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.workers.celery_app worker --loglevel=info --queues=enhancement --concurrency=2
    env_file: ./backend/.env
    environment:
      - AWS_ENDPOINT_URL=http://minio:9000
    depends_on:
      - redis
      - postgres
      - minio-init
    volumes:
      - ./backend/app:/app/app
      - model_weights:/app/models
    restart: unless-stopped

  # ── Celery Beat (credit reset scheduler) ────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: ./backend/.env
    depends_on:
      - redis
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  # ── Flower (Celery monitor) ──────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0.1
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_placeholder
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_weights:
