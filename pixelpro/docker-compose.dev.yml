version: "3.9"

# Local dev override: no GPU, MinIO instead of real S3, no Nginx
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # Override worker: drop GPU reservation
  worker:
    deploy:
      resources: {}

  # Drop Nginx for local dev (access services directly on their ports)
  nginx:
    profiles: ["prod-only"]  # prevents it from starting in dev

  # Local S3-compatible storage (MinIO)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot container: create the two S3 buckets on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/pixelpro-inputs &&
        mc mb --ignore-existing local/pixelpro-outputs &&
        mc anonymous set download local/pixelpro-outputs &&
        echo 'Buckets ready.'
      "

  # Override api + worker to point S3 endpoint at MinIO
  api:
    environment:
      - AWS_ENDPOINT_URL=http://minio:9000

  worker-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    env_file: ./backend/.env
    environment:
      - AWS_ENDPOINT_URL=http://minio:9000
    depends_on:
      - redis
      - postgres
      - minio
    volumes:
      - model_weights:/app/models
      - ./backend/app:/app/app   # live-reload source mount

volumes:
  minio_data:
